<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FaroAI - 个人博客，分享技术文章、项目经验和学习心得">
    <meta name="keywords" content="FaroAI, 技术博客，编程，学习, OpenClaw">
    <meta property="og:title" content="FaroAI - 个人博客">
    <meta property="og:description" content="分享技术文章、项目经验和学习心得">
    <meta property="og:type" content="website">
    <title>FaroAI - 个人博客 | 技术分享与学习心得</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --text-color: #333;
            --text-light: #666;
            --bg-color: #f5f5f5;
            --card-shadow: 0 2px 8px rgba(0,0,0,0.1);
            --transition-speed: 0.3s;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            min-height: 100vh;
            color: var(--text-color);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 顶部导航 */
        .header {
            background: white;
            padding: 20px 0;
            box-shadow: var(--card-shadow);
            margin-bottom: 40px;
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 2em;
            font-weight: bold;
            color: var(--text-color);
            text-decoration: none;
        }
        
        .logo span {
            color: var(--primary-color);
        }
        
        .nav {
            display: flex;
            gap: 30px;
        }
        
        .nav a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: color var(--transition-speed);
        }
        
        .nav a:hover {
            color: var(--primary-color);
        }
        
        /* 博客列表 */
        .blog-header {
            text-align: center;
            color: white;
            margin-bottom: 60px;
        }
        
        .blog-header h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .blog-header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .search-bar {
            max-width: 600px;
            margin: 30px auto 0;
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            outline: none;
        }
        
        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5em;
            color: var(--text-light);
        }
        
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }
        
        .blog-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
            cursor: pointer;
        }
        
        .blog-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .blog-card-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3em;
        }
        
        .blog-card-content {
            padding: 25px;
        }
        
        .blog-card-title {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: var(--text-color);
        }
        
        .blog-card-excerpt {
            color: var(--text-light);
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .blog-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
            color: var(--text-light);
        }
        
        .blog-card-date {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .blog-card-category {
            background: var(--primary-color);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
        }
        
        .blog-card-cta {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: gap var(--transition-speed);
        }
        
        .blog-card-cta:hover {
            gap: 10px;
        }
        
        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 60px;
            flex-wrap: wrap;
        }
        
        .pagination-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: white;
            color: var(--text-color);
            cursor: pointer;
            font-size: 1em;
            transition: all var(--transition-speed);
        }
        
        .pagination-btn:hover {
            background: var(--primary-color);
            color: white;
        }
        
        .pagination-btn.active {
            background: var(--primary-color);
            color: white;
        }
        
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 视频弹窗 */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .video-modal.active {
            display: flex;
        }
        
        .video-container {
            position: relative;
            background: white;
            padding: 10px;
            border-radius: 15px;
            max-width: 95%;
            max-height: 95%;
        }
        
        .video-container iframe {
            border-radius: 10px;
            width: 100%;
            height: 100%;
            min-width: 560px;
            min-height: 315px;
        }
        
        .close-btn {
            position: absolute;
            top: -20px;
            right: -20px;
            background: #f44336;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            line-height: 1;
            z-index: 1001;
        }
        
        .close-btn:hover {
            background: #d32f2f;
        }
        
        /* 状态日志 */
        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            border-radius: 10px;
            font-family: monospace;
            font-size: 12px;
            max-width: 400px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 3000;
            display: none;
        }
        
        .status.show {
            display: block;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 20px;
            }
            
            .nav {
                gap: 20px;
            }
            
            .blog-header h1 {
                font-size: 2em;
            }
            
            .blog-grid {
                grid-template-columns: 1fr;
            }
            
            .blog-card-image {
                min-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <a href="#" class="logo">🚀 Faro<span>AI</span></a>
            <nav class="nav">
                <a href="#" onclick="showPage('home')">首页</a>
                <a href="#" onclick="showPage('about')">关于</a>
                <a href="#" onclick="showPage('contact')">联系</a>
            </nav>
        </div>
    </div>

    <div class="container">
        <div class="blog-header">
            <h1>📝 FaroAI 博客</h1>
            <p>分享技术文章、项目经验和学习心得</p>
            <div class="search-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索文章...">
                <span class="search-icon">🔍</span>
            </div>
        </div>

        <div class="blog-grid" id="blogGrid">
            <!-- 文章列表将通过 JS 动态生成 -->
        </div>

        <div class="pagination" id="pagination">
            <!-- 分页按钮将通过 JS 动态生成 -->
        </div>
    </div>

    <!-- 视频弹窗 -->
    <div class="video-modal" id="videoModal">
        <div class="video-container">
            <button class="close-btn" id="closeModal">×</button>
            <iframe id="videoFrame" style="display:none;" frameborder="0" scrolling="no" allowfullscreen allow="autoplay; fullscreen"></iframe>
        </div>
    </div>

    <!-- 状态日志 -->
    <div class="status" id="statusLog"></div>

    <script>
    (function() {
        'use strict';
        
        // 博客文章数据
        const blogPosts = [
            {
                id: 1,
                title: 'OpenClaw 使用指南',
                excerpt: '深入讲解 OpenClaw 的配置、部署和使用技巧，帮助你快速上手智能代理系统。',
                category: '技术',
                date: '2026-03-30',
                author: '炜哥',
                image: '🤖',
                content: '完整文章内容...'
            },
            {
                id: 2,
                title: 'ollama 模型优化实践',
                excerpt: '分享本地 LLM 模型的性能优化经验，包括参数调整、内存管理等内容。',
                category: 'AI',
                date: '2026-03-29',
                author: '炜哥',
                image: '🧠',
                content: '完整文章内容...'
            },
            {
                id: 3,
                title: 'FaroAI 网站建设心得',
                excerpt: '记录 FaroAI 个人博客从 0 到 1 的搭建过程，包括技术选型和部署经验。',
                category: '项目',
                date: '2026-03-28',
                author: '炜哥',
                image: '🚀',
                content: '完整文章内容...'
            },
            {
                id: 4,
                title: 'Apple Silicon 性能评测',
                excerpt: 'M4 Pro 芯片的性能测试和实际使用体验分享。',
                category: '硬件',
                date: '2026-03-27',
                author: '炜哥',
                image: '💻',
                content: '完整文章内容...'
            },
            {
                id: 5,
                title: '机器学习入门指南',
                excerpt: '为初学者准备的机器学习入门教程，涵盖基本概念和常用算法。',
                category: 'AI',
                date: '2026-03-26',
                author: '炜哥',
                image: '📚',
                content: '完整文章内容...'
            },
            {
                id: 6,
                title: '微信机器人开发实战',
                excerpt: '使用 Python 开发微信机器人的完整教程，包括 API 调用和消息处理。',
                category: '开发',
                date: '2026-03-25',
                author: '炜哥',
                image: '🤖',
                content: '完整文章内容...'
            }
        ];

        // 状态变量
        let currentPage = 1;
        const postsPerPage = 6;
        let filteredPosts = [...blogPosts];

        // DOM 元素
        const blogGrid = document.getElementById('blogGrid');
        const pagination = document.getElementById('pagination');
        const searchInput = document.getElementById('searchInput');
        const videoModal = document.getElementById('videoModal');
        const videoFrame = document.getElementById('videoFrame');
        const closeModal = document.getElementById('closeModal');
        const statusLog = document.getElementById('statusLog');

        // 日志功能
        function log(message) {
            if (statusLog) {
                const timestamp = new Date().toLocaleTimeString();
                statusLog.textContent = '[' + timestamp + '] ' + message + '\n' + statusLog.textContent;
                statusLog.classList.add('show');
                setTimeout(() => {
                    statusLog.classList.remove('show');
                }, 3000);
            }
            console.log('[FaroAI Blog ' + timestamp + '] ' + message);
        }

        // 渲染文章列表
        function renderPosts() {
            blogGrid.innerHTML = '';
            
            const startIndex = (currentPage - 1) * postsPerPage;
            const endIndex = startIndex + postsPerPage;
            const paginatedPosts = filteredPosts.slice(startIndex, endIndex);

            if (paginatedPosts.length === 0) {
                blogGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: #666;">暂无文章</div>';
                log('⚠️ 没有可显示的文章');
                return;
            }

            paginatedPosts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'blog-card';
                card.innerHTML = `
                    <div class="blog-card-image">${post.image}</div>
                    <div class="blog-card-content">
                        <h2 class="blog-card-title">${post.title}</h2>
                        <p class="blog-card-excerpt">${post.excerpt}</p>
                        <div class="blog-card-meta">
                            <span class="blog-card-date">📅 ${post.date}</span>
                            <span class="blog-card-category">${post.category}</span>
                        </div>
                        <a href="#" class="blog-card-cta" onclick="openArticle(${post.id}); return false;">
                            阅读全文 →
                        </a>
                    </div>
                `;
                card.addEventListener('click', () => openArticle(post.id));
                blogGrid.appendChild(card);
            });

            log(`✅ 渲染了 ${paginatedPosts.length} 篇文章`);
        }

        // 渲染分页
        function renderPagination() {
            pagination.innerHTML = '';
            const totalPages = Math.ceil(filteredPosts.length / postsPerPage);

            if (totalPages <= 1) return;

            // 上一页
            const prevBtn = document.createElement('button');
            prevBtn.className = 'pagination-btn';
            prevBtn.textContent = '← 上一页';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderPosts();
                    renderPagination();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };
            pagination.appendChild(prevBtn);

            // 页码
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    const pageBtn = document.createElement('button');
                    pageBtn.className = 'pagination-btn' + (i === currentPage ? ' active' : '');
                    pageBtn.textContent = i;
                    pageBtn.onclick = () => {
                        currentPage = i;
                        renderPosts();
                        renderPagination();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    };
                    pagination.appendChild(pageBtn);
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    const ellipsis = document.createElement('span');
                    ellipsis.className = 'pagination-btn';
                    ellipsis.textContent = '...';
                    ellipsis.disabled = true;
                    pagination.appendChild(ellipsis);
                }
            }

            // 下一页
            const nextBtn = document.createElement('button');
            nextBtn.className = 'pagination-btn';
            nextBtn.textContent = '下一页 →';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderPosts();
                    renderPagination();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };
            pagination.appendChild(nextBtn);

            log(`✅ 渲染了 ${totalPages} 页分页`);
        }

        // 打开文章
        function openArticle(id) {
            log(`📖 打开文章 #${id}`);
            const post = blogPosts.find(p => p.id === id);
            if (post) {
                alert(`📖 ${post.title}\n\n${post.excerpt}\n\n完整内容将在未来版本中显示！`);
            }
        }

        // 搜索功能
        function searchPosts(query) {
            query = query.toLowerCase().trim();
            filteredPosts = blogPosts.filter(post => 
                post.title.toLowerCase().includes(query) ||
                post.excerpt.toLowerCase().includes(query) ||
                post.category.toLowerCase().includes(query)
            );
            currentPage = 1;
            renderPosts();
            renderPagination();
            log(`🔍 搜索 "${query}" 找到 ${filteredPosts.length} 篇文章`);
        }

        // 视频功能
        function openVideo() {
            log('🎬 打开视频：养虾指南 BV1RxPQzcEQj');
            const videoBvid = 'BV1RxPQzcEQj';
            const playerUrl = 'https://player.bilibili.com/player.html?bvid=' + videoBvid + '&page=1&high_quality=1&danmaku=0&autoplay=1';
            videoFrame.src = playerUrl;
            videoFrame.style.display = 'block';
            videoModal.classList.add('active');
            log('✅ 视频弹窗已显示');
        }

        function closeVideo() {
            videoModal.classList.remove('active');
            videoFrame.src = '';
            videoFrame.style.display = 'none';
            log('🔒 视频已关闭');
        }

        // 事件监听器
        searchInput.addEventListener('input', (e) => {
            searchPosts(e.target.value);
        });

        closeModal.addEventListener('click', closeVideo);

        videoModal.addEventListener('click', (e) => {
            if (e.target === videoModal) {
                closeVideo();
            }
        });

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && videoModal.classList.contains('active')) {
                closeVideo();
            }
            if (e.key === 'f' && e.ctrlKey) {
                e.preventDefault();
                searchInput.focus();
            }
        });

        // 初始化
        log('🚀 FaroAI 博客已加载');
        renderPosts();
        renderPagination();

    })();
    </script>
</body>
</html>
