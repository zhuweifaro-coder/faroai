    <script>
        (function () {
            const pages = [
                { title: '首页：本地优先 AI 助手工作台', url: 'index.html#home', type: '首页', text: 'FaroAI OpenClaw Gateway 微信机器人 本地模型 Ollama 自动化工作流 运行控制台' },
                { title: '动态工作流演示', url: 'index.html#workflow-lab', type: '演示', text: '每日简报 知识库问答 市场复盘 Gateway 工具调用 模型输出' },
                { title: '功能特性', url: 'features.html', type: '功能', text: '多模态输入 自动化任务流 本地优先安全 团队协作 快速集成 持续分析' },
                { title: '文档中心', url: 'docs.html', type: '文档', text: '安装升级 Gateway 微信机器人 模型配置 知识库 自动化任务流 故障排查' },
                { title: '投资研究：7月投资标的筛选逻辑', url: 'investment.html', type: '投资', text: 'AI 视频 股票筛选 投资研究 7月目标 产业逻辑 兑现节奏 买点纪律 风险边界' },
                { title: 'OpenClaw 安装与升级', url: 'docs.html#install', type: '文档', text: 'OpenClaw 2026.6.10 当前运行 latest stable CLI reliability task recovery Gateway 微信机器人 Ollama 本地模型 restart doctor update' },
                { title: '微信机器人配置', url: 'docs.html#wechat', type: '文档', text: 'openclaw-weixin 微信通道 消息发送 接收 二维码 配置 排障' },
                { title: '模型配置', url: 'docs.html#models', type: '文档', text: 'Ollama qwen OpenAI 模型路由 fallback 本地优先 强模型兜底' },
                { title: '知识库', url: 'docs.html#knowledge', type: '文档', text: '个人知识库 文档检索 文件引用 资料整理 问答' },
                { title: '自动化任务流', url: 'docs.html#workflows', type: '文档', text: 'cron 定时任务 股票日报 每日简报 失败重试 超时报警' },
                { title: '工作流日志：OpenClaw、Codex 自动化与本地 AI 周报', url: 'blog.html', type: '日志', text: 'OpenClaw 2026.6.10 Codex 长任务 AI Agent Agents SDK 0.17.0 Ollama 0.30.11 微信机器人 自动化工作流 工作流日志 技术文章 教程 行业动态' },
                { title: '集成说明', url: 'api.html', type: '集成', text: 'OpenClaw Gateway OpenAI SDK 本地集成 API 说明 静态站 SaaS 边界' },
                { title: '使用场景', url: 'usecases.html', type: '用例', text: '开发辅助 内容创作 数据分析 学习辅助 微信入口 工作流' },
                { title: '联系方式', url: 'contact.html', type: '联系', text: 'faro@vip.163.com 微信二维码 联系站长 试用 部署支持' },
                { title: '关于我', url: '个人概况_2026_v3.html', type: '关于', text: 'FARO 站长 项目发起人 本地 AI 微信机器人 自动化实践' }
            ];

            const form = document.getElementById('siteSearchForm');
            const input = document.getElementById('siteSearchInput');
            const results = document.getElementById('searchResults');
            const summary = document.getElementById('searchSummary');

            function render(query) {
                const q = query.trim().toLowerCase();
                const matched = q
                    ? pages.filter(item => `${item.title} ${item.type} ${item.text}`.toLowerCase().includes(q))
                    : pages.slice(0, 8);

                summary.textContent = q ? `找到 ${matched.length} 个结果：${query}` : '常用入口';
                results.innerHTML = matched.map(item => `
                    <a class="search-result-card" href="${item.url}">
                        <span>${item.type}</span>
                        <strong>${item.title}</strong>
                        <p>${item.text}</p>
                    </a>
                `).join('') || '<p class="search-empty">没有找到结果。可以尝试搜索“OpenClaw”“微信机器人”“知识库”“股票日报”。</p>';
            }

            form.addEventListener('submit', event => {
                event.preventDefault();
                const q = input.value.trim();
                const url = new URL(window.location.href);
                if (q) url.searchParams.set('q', q);
                else url.searchParams.delete('q');
                window.history.replaceState({}, '', url);
                render(q);
            });

            input.addEventListener('input', () => render(input.value));
            const initial = new URLSearchParams(window.location.search).get('q') || '';
            input.value = initial;
            render(initial);
        })();
    </script>
